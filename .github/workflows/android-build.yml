name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Generate Debug Keystore
      run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: List files to verify
      run: ls -la | grep gradle

    - name: Clean and Build with Gradle
      run: ./gradlew clean build -x test --stacktrace

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/
        retention-days: 30
      continue-on-error: true

    - name: Run Unit Tests
      run: ./gradlew test --stacktrace
      continue-on-error: true

    - name: Generate Build Report
      if: always()
      run: |
        echo "## Android Build Report" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "**Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Gradle Version:** 9.3.1" >> $GITHUB_STEP_SUMMARY
